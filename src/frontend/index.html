<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bunssh</title>
  <link rel="icon" id="favicon" href="data:,">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="login">
    <form id="login-form">
      <h1>bunssh</h1>
      <input type="text" id="host" placeholder="Host" value="localhost" required>
      <input type="number" id="port" placeholder="Port" value="22" required>
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <details id="env-section">
        <summary>Environment variables</summary>
        <div id="env-rows"></div>
        <button type="button" id="env-add">+ Add variable</button>
      </details>
      <button type="submit">Connect</button>
      <div id="login-error"></div>
    </form>
  </div>

  <div id="terminal-container" style="display: none;">
    <div id="terminal-area">
      <div id="terminal"></div>
    </div>
    <aside id="metrics-panel" aria-hidden="true">
      <div class="hud-conn">
        <span id="m-led" class="hud-led" data-state="idle"></span>
        <span id="m-state" class="hud-state" data-state="idle">IDLE</span>
        <span id="m-uptime" class="hud-uptime">—</span>
        <div id="m-identity" class="hud-identity">—</div>
        <span id="m-reconnects" class="hud-reconnects" hidden></span>
      </div>

      <div id="m-env-section" style="display: none;">
        <div class="hud-rule"><span>Environment</span></div>
        <dl id="m-env" class="hud-env"></dl>
      </div>

      <details id="m-debug" class="hud-debug">
      <summary>debug</summary>
      <div class="hud-debug-body">
      <div class="hud-rule"><span>Throughput</span></div>
      <div class="hud-throughput">
        <span class="hud-stat"><span class="hud-ico">↓</span><span id="m-bytes-in">0 B</span></span>
        <span class="hud-stat"><span class="hud-ico">↑</span><span id="m-bytes-out">0 B</span></span>
        <span class="hud-stat"><span class="hud-ico">✎</span><span id="m-writes">0</span></span>
      </div>
      <div id="m-spark" class="hud-spark" aria-hidden="true"></div>
      <div class="hud-rate"><span id="m-rate">0 B/s</span> in</div>

      <div class="hud-rule"><span>Activity</span></div>
      <div class="hud-activity">
        <span id="m-idle" class="hud-actdot" data-idle="">—</span>
        <span id="m-lastbyte" class="hud-lastbyte">—</span>
      </div>

      <div class="hud-rule"><span>Events</span></div>
      <ul id="m-events" class="hud-events"></ul>
      </div>
      </details>

      <div id="m-alert" style="display: none;"></div>
    </aside>
  </div>

  <div id="disconnect-overlay" style="display: none;">
    <div id="disconnect-message">
      <p>SSH session disconnected</p>
      <button id="reconnect-btn">Reconnect</button>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
